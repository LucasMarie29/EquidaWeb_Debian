<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Equida</title>
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"
          integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u"
          crossorigin="anonymous">
    <style>
        body {
            padding-top: 70px;
        }
        .hero {
            background-color: #f5f5f5;
            border-radius: 8px;
            padding: 40px;
            margin-bottom: 30px;
            text-align: center;
        }
        .section-title {
            margin-top: 30px;
            margin-bottom: 15px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 8px;
        }
    </style>
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-inverse navbar-fixed-top">
    <div class="container">
        <div class="navbar-header">
            <a href="index.html" class="navbar-brand">
                Système de gestion des ventes aux enchères de chevaux
            </a>
        </div>
    </div>
</nav>

<div class="container">

    <!-- Hero -->
    <div class="hero">
        <h1>
            <span class="glyphicon glyphicon-home"></span> Bienvenue sur Equida
        </h1>
        <p class="lead">Gestion des chevaux et des ventes aux enchères</p>
    </div>

    <!-- Section Chevaux -->
    <h3 class="section-title">
        <span class="glyphicon glyphicon-th-list"></span> Chevaux
    </h3>
    <div class="row">
        <div class="col-sm-6">
            <a href="cheval-servlet/list" class="btn btn-default btn-block btn-lg">
                <span class="glyphicon glyphicon-list"></span> Liste des chevaux
            </a>
        </div>
        <div class="col-sm-6">
            <a href="cheval-servlet/add" class="btn btn-primary btn-block btn-lg">
                <span class="glyphicon glyphicon-plus"></span> Ajouter un cheval
            </a>
        </div>
    </div>

    <!-- Section Ventes -->
    <h3 class="section-title">
        <span class="glyphicon glyphicon-usd"></span> Ventes
    </h3>
    <div class="row">
        <div class="col-sm-6">
            <a href="vente-servlet/list" class="btn btn-default btn-block btn-lg">
                <span class="glyphicon glyphicon-list"></span> Liste des ventes
            </a>
        </div>
        <div class="col-sm-6">
            <a href="vente-servlet/add" class="btn btn-success btn-block btn-lg">
                <span class="glyphicon glyphicon-plus"></span> Ajouter une vente
            </a>
        </div>
    </div>

</div>

<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
</body>
</html>
